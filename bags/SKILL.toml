[skill]
name        = "bags"
version     = "1.1.0"
description = "Launch and manage tokens on Bags.fm — trade, price-check, view claimable fees, and list on Dexscreener."
author      = "0x01 World"
tags        = ["bags", "token", "launch", "defi", "solana", "fee-sharing", "trading"]

# ── Agent instructions (injected into system prompt) ─────────────────────────
prompts = ["""
# Bags Token Launch & Trading

You can launch, trade, and manage Solana tokens on Bags.fm directly from this agent.

## Capabilities

1. **Launch** — bags_launch creates IPFS metadata, sets up fee-sharing, and deploys your token.
   Requires ~0.05 SOL in your agent hot wallet for mint account creation.
2. **Trade** — bags_swap_quote to check price, bags_swap_execute to buy or sell.
   Amounts: lamports for buys (1 SOL = 1_000_000_000), token base units for sells.
3. **Pool info / price** — bags_pool shows current reserves and implied price for any token.
4. **Claim fees** — bags_claim collects fees for a specific token; bags_claimable shows all pending.
5. **Positions** — bags_positions lists all tokens you launched with their fee balances.
6. **Dexscreener listing** — bags_dexscreener_check shows availability and cost;
   bags_dexscreener_list pays and submits the listing in one step.

## Rules

- Only launch tokens with honest names and descriptions — no impersonation or fraud.
- Confirm with the user before executing any trade or spending SOL.
- The initial_buy_lamports field is optional. Use 0 or omit for no initial purchase.
- After claiming, tell the user how many transactions were submitted.
- For bags_swap_execute, report the txid and the quote details so the user can verify.

## Rate limiting

If a tool returns JSON containing `"error":"bags_rate_limited"` or HTTP 429, include the exact
token `[BAGS_RATE_LIMITED]` somewhere in your reply. Do not include this token for any other error.
"""]

# ── Tools ─────────────────────────────────────────────────────────────────────
# Note: -s (silent) without -f so error JSON is returned to the LLM.

[[tools]]
name        = "bags_launch"
description = "Launch a new Solana token on Bags.fm. You automatically receive 100% of all future pool trading fees as creator. Requires ~0.05 SOL in hot wallet."
kind        = "shell"
command     = """jq -nc --arg n {name} --arg s {symbol} --arg d {description} --arg img {image_url} --argjson buy {initial_buy_lamports} '{"name":$n,"symbol":$s,"description":$d,"image_url":($img|if . == "" then null else . end),"initial_buy_lamports":($buy|if . == 0 then null else . end)}' | curl -s -X POST "${ZX01_NODE:-http://127.0.0.1:9090}/bags/launch" -H "Content-Type: application/json" -H "Authorization: Bearer ${ZX01_TOKEN:-}" -d @-"""

[tools.args]
name                 = "Token name, e.g. 'My Agent Token'"
symbol               = "Ticker symbol, 2–8 uppercase chars, e.g. 'MAT'"
description          = "Short description of what the token represents (1–3 sentences)"
image_url            = "URL of the token image. Leave empty string to skip."
initial_buy_lamports = "Lamports to spend on an initial buy at launch. Use 0 for no initial buy. Example: 100000000 = 0.1 SOL."

[[tools]]
name        = "bags_swap_quote"
description = "Get a swap quote for buying or selling a token on the Bags AMM. Use this to check price and expected output before executing."
kind        = "shell"
command     = """jq -nc --arg m {token_mint} --argjson amt {amount} --arg act {action} --argjson slip {slippage_bps} '{"token_mint":$m,"amount":$amt,"action":$act,"slippage_bps":($slip|if . == 0 then null else . end)}' | curl -s -X POST "${ZX01_NODE:-http://127.0.0.1:9090}/bags/swap/quote" -H "Content-Type: application/json" -H "Authorization: Bearer ${ZX01_TOKEN:-}" -d @-"""

[tools.args]
token_mint  = "Base58 mint address of the token to trade"
amount      = "Amount to trade: lamports for buys (100000000 = 0.1 SOL), token base units for sells"
action      = "\"buy\" or \"sell\""
slippage_bps = "Slippage tolerance in basis points (e.g. 50 = 0.5%). Use 0 for default."

[[tools]]
name        = "bags_swap_execute"
description = "Execute a token swap on the Bags AMM — gets quote, signs, and broadcasts in one step. Returns a txid on success."
kind        = "shell"
command     = """jq -nc --arg m {token_mint} --argjson amt {amount} --arg act {action} --argjson slip {slippage_bps} '{"token_mint":$m,"amount":$amt,"action":$act,"slippage_bps":($slip|if . == 0 then null else . end)}' | curl -s -X POST "${ZX01_NODE:-http://127.0.0.1:9090}/bags/swap/execute" -H "Content-Type: application/json" -H "Authorization: Bearer ${ZX01_TOKEN:-}" -d @-"""

[tools.args]
token_mint  = "Base58 mint address of the token to trade"
amount      = "Amount to trade: lamports for buys (100000000 = 0.1 SOL), token base units for sells"
action      = "\"buy\" or \"sell\""
slippage_bps = "Slippage tolerance in basis points (e.g. 50 = 0.5%). Use 0 for default."

[[tools]]
name        = "bags_pool"
description = "Get Bags AMM pool info for a token: current reserves, implied price, TVL, and 24h volume."
kind        = "shell"
command     = """curl -s "${ZX01_NODE:-http://127.0.0.1:9090}/bags/pool/{token_mint}" -H "Authorization: Bearer ${ZX01_TOKEN:-}" """

[tools.args]
token_mint = "Base58 mint address of the token to look up"

[[tools]]
name        = "bags_claimable"
description = "List all tokens with unclaimed pool fee revenue across your entire agent wallet — not just tokens you launched."
kind        = "shell"
command     = """curl -s "${ZX01_NODE:-http://127.0.0.1:9090}/bags/claimable" -H "Authorization: Bearer ${ZX01_TOKEN:-}" """

[[tools]]
name        = "bags_claim"
description = "Claim accumulated pool trading fees for a specific token you launched on Bags.fm."
kind        = "shell"
command     = """jq -nc --arg m {token_mint} '{"token_mint":$m}' | curl -s -X POST "${ZX01_NODE:-http://127.0.0.1:9090}/bags/claim" -H "Content-Type: application/json" -H "Authorization: Bearer ${ZX01_TOKEN:-}" -d @-"""

[tools.args]
token_mint = "Base58 mint address of the token to claim fees for"

[[tools]]
name        = "bags_positions"
description = "List all tokens you have launched on Bags.fm and their claimable fee balances."
kind        = "shell"
command     = """curl -s "${ZX01_NODE:-http://127.0.0.1:9090}/bags/positions" -H "Authorization: Bearer ${ZX01_TOKEN:-}" """

[[tools]]
name        = "bags_dexscreener_check"
description = "Check whether a Dexscreener listing is available for a token and how much it costs."
kind        = "shell"
command     = """curl -s "${ZX01_NODE:-http://127.0.0.1:9090}/bags/dexscreener/check/{token_mint}" -H "Authorization: Bearer ${ZX01_TOKEN:-}" """

[tools.args]
token_mint = "Base58 mint address of the token to check"

[[tools]]
name        = "bags_dexscreener_list"
description = "Create a Dexscreener listing for a token — signs and pays in one step. Always check bags_dexscreener_check first and confirm cost with the user."
kind        = "shell"
command     = """jq -nc --arg m {token_mint} --arg img {image_url} '{"token_mint":$m,"image_url":($img|if . == "" then null else . end)}' | curl -s -X POST "${ZX01_NODE:-http://127.0.0.1:9090}/bags/dexscreener/list" -H "Content-Type: application/json" -H "Authorization: Bearer ${ZX01_TOKEN:-}" -d @-"""

[tools.args]
token_mint = "Base58 mint address of the token to list on Dexscreener"
image_url  = "HTTPS URL of the token image for the Dexscreener listing. Leave empty string to skip."
