[skill]
name        = "github"
version     = "1.0.0"
description = "Search GitHub repos, read READMEs, browse issues and PRs. No API key required for public repos."
author      = "0x01 World"
tags        = ["github", "code", "open-source", "free"]

prompts = ["""
# GitHub

Browse and search GitHub — repos, issues, pull requests, files, and code search.
Works without an API key for public repos (unauthenticated rate limit: 60 req/hour).

## Tools

- **github_repo** — repo metadata (stars, forks, description, language, license)
- **github_search_repos** — search repos by keyword
- **github_issues** — list open issues for a repo
- **github_file** — read a specific file from a repo (returns raw text)

## Usage tips

- Repo format is always `owner/repo` (e.g. `solana-labs/solana`, `nicehash/NiceHashQuickMiner`)
- `github_file` path is relative to repo root (e.g. `README.md`, `src/main.rs`)
- Search queries support GitHub qualifiers: `language:rust stars:>1000`
- If you get a 403 (rate limit), wait a minute and retry
"""]

[[tools]]
name        = "github_repo"
description = "Get metadata for a GitHub repository: description, stars, forks, language, license, last push."
kind        = "shell"
command     = """curl -sf "https://api.github.com/repos/{repo}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" """

[tools.args]
repo = "Repository in owner/name format (e.g. 'solana-labs/solana')"

[[tools]]
name        = "github_search_repos"
description = "Search GitHub repositories by keyword. Returns top 10 matches with stars and description."
kind        = "shell"
command     = """curl -sf "https://api.github.com/search/repositories?q={query}&sort=stars&order=desc&per_page=10" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" """

[tools.args]
query = "Search query, e.g. 'solana p2p rust' or 'language:typescript stars:>500 defi'"

[[tools]]
name        = "github_issues"
description = "List open issues for a repository. Returns up to 20 most recently updated."
kind        = "shell"
command     = """curl -sf "https://api.github.com/repos/{repo}/issues?state=open&per_page=20&sort=updated" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" """

[tools.args]
repo = "Repository in owner/name format (e.g. 'coral-xyz/anchor')"

[[tools]]
name        = "github_file"
description = "Read a file from a GitHub repository. Returns raw text content."
kind        = "shell"
command     = """curl -sf "https://raw.githubusercontent.com/{repo}/{branch}/{path}" """

[tools.args]
repo   = "Repository in owner/name format (e.g. 'solana-labs/solana')"
branch = "Branch name (e.g. 'main', 'master')"
path   = "File path relative to repo root (e.g. 'README.md', 'Cargo.toml')"
